<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --fh:'Syne',sans-serif;
  --fm:'DM Mono',monospace;
  --ff:'Plus Jakarta Sans Variable',sans-serif;
  --bg:#EDECEA;--bg2:#E4E2DF;--white:#FFFFFF;
  --text:#111110;--text2:#6B6965;--text3:#A8A5A0;
  --line:rgba(0,0,0,0.08);--line2:rgba(0,0,0,0.16);
  --acc:#E8490A;--acc-bg:#FCE8E0;
  --c1:#E8490A;--c2:#111110;--c3:#6B6965;--c4:#A8A5A0;
  --R:28px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--ff);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;min-height:100dvh}
.app{display:flex;flex-direction:column;flex:1;max-width:560px;width:100%;margin:0 auto;min-height:100dvh}

/* ── AUTH ── */
.auth{display:flex;flex-direction:column;flex:1;padding:max(env(safe-area-inset-top),32px) 24px 40px}
.auth-logo{margin-bottom:28px}
.auth-kicker{font-family:var(--fm);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.auth-h{font-family:var(--fh);font-size:46px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:.9;margin-bottom:6px}
.auth-h span{color:var(--acc)}
.auth-sub{font-family:var(--fm);font-size:12px;letter-spacing:.02em;color:var(--text3);line-height:1.7;margin-bottom:32px}
.auth-steps{display:flex;flex-direction:column;margin-bottom:24px;border:1px solid var(--line2);background:var(--white)}
.auth-step{display:flex;gap:14px;padding:14px 16px;border-bottom:1px solid var(--line);font-family:var(--fm);font-size:12px;letter-spacing:.02em;color:var(--text2);line-height:1.5;align-items:flex-start}
.auth-step:last-child{border-bottom:none}
.auth-sn{color:var(--acc);min-width:18px;font-size:11px;padding-top:1px}
.auth-step a{color:var(--text);text-decoration:underline;text-underline-offset:3px}
.auth-box{background:var(--white);border:1px solid var(--line2);padding:20px;margin-bottom:12px}
.auth-box-lbl{font-family:var(--fm);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.auth-input{width:100%;background:var(--bg);border:1px solid var(--line2);padding:14px 16px;font-family:var(--fm);font-size:13px;letter-spacing:.04em;color:var(--text);outline:none;margin-bottom:14px}
.auth-input:focus{border-color:var(--text)}
.auth-input::placeholder{color:var(--text3)}
.auth-cta{width:100%;padding:16px;background:var(--text);color:var(--white);border:none;font-family:var(--fh);font-size:16px;font-weight:700;letter-spacing:-.01em;cursor:pointer;transition:opacity .15s}
.auth-cta:hover{opacity:.88}
.auth-skip{font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);cursor:pointer;text-align:center;display:block;margin-top:16px}

/* ── HEADER ── */
.hdr{padding:max(env(safe-area-inset-top),20px) 20px 0;border-bottom:1px solid var(--line2)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hdr-date{font-family:var(--fm);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.hdr-right{display:flex;gap:8px;align-items:center}
.hchip{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;background:var(--white);border:1px solid var(--line2)}
.hchip-dot{width:6px;height:6px;border-radius:50%;background:var(--acc)}
.hchip-lbl{font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}
.user-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px 5px 5px;background:var(--white);border:1px solid var(--line2);cursor:pointer}
.user-av{width:24px;height:24px;border-radius:50%;object-fit:cover;background:var(--bg2);flex-shrink:0}
.user-nm{font-family:var(--fm);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}
.hdr-kicker{font-family:var(--fm);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.hdr-title{font-family:var(--fh);font-size:40px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:.9;margin-bottom:16px}
.hdr-title span{color:var(--acc)}

/* Area tabs — full words */
.area-tabs{display:flex;border-top:1px solid var(--line2);overflow-x:auto;-webkit-overflow-scrolling:touch}
.area-tabs::-webkit-scrollbar{display:none}
.atab{flex:1;min-width:0;padding:10px 6px;text-align:center;font-family:var(--fm);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);border-right:1px solid var(--line2);position:relative;white-space:nowrap}
.atab:last-child{border-right:none}
.atab.on{color:var(--text);background:var(--white)}
.atab.on::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc)}

/* ── STEPS ── */
.steps{display:flex;border-bottom:1px solid var(--line2)}
.sn{flex:1;padding:10px 8px;cursor:pointer;border-right:1px solid var(--line2);position:relative;transition:background .12s}
.sn:last-child{border-right:none}
.sn.on{background:var(--white)}
.sn-bar{position:absolute;top:0;left:0;right:0;height:2px;background:transparent}
.sn.on .sn-bar{background:var(--acc)}
.sn-num{font-family:var(--fm);font-size:9px;letter-spacing:.12em;color:var(--text3);margin-bottom:4px}
.sn.on .sn-num{color:var(--acc)}
.sn.done .sn-num{color:var(--text2)}
.sn-lbl{font-family:var(--fh);font-size:11px;font-weight:700;color:var(--text3);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sn.on .sn-lbl{color:var(--text)}

/* ── BODY ── */
.body{padding:20px 20px 14px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.step-num{font-family:var(--fm);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.step-head-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.step-t{font-family:var(--fh);font-size:28px;font-weight:700;color:var(--text);letter-spacing:-.03em;line-height:1;margin-bottom:4px}
.step-s{font-family:var(--fm);font-size:11px;letter-spacing:.03em;color:var(--text3);margin-bottom:18px;line-height:1.5}
.sync-btn{font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:9px 14px;background:var(--white);border:1px solid var(--line2);color:var(--text2);cursor:pointer;flex-shrink:0;margin-top:2px;min-height:44px}

/* ── TASK CARDS ── */
.tcard{
  display:flex;align-items:center;gap:0;
  height:58px;
  background:var(--white);
  border:1px solid var(--line2);
  border-radius:0 var(--R) var(--R) 0;
  margin-bottom:8px;
  overflow:hidden;
  transition:opacity .2s;
}
.tcard.done{opacity:.30}
.tc-bar{width:4px;height:100%;flex-shrink:0;align-self:stretch}
.chk-wrap{width:52px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.chk-c{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line2);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ttxt{flex:1;font-family:var(--ff);font-size:15px;font-weight:500;color:var(--text);line-height:1.3;padding-right:6px}
.ttxt.x{text-decoration:line-through;color:var(--text3)}
.ttag{font-family:var(--fm);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);flex-shrink:0}
/* Move button */
.tmv{
  width:44px;height:44px;min-width:44px;min-height:44px;
  border-radius:50%;border:1.5px solid;
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;margin-right:7px;padding:0;
}
.tmv:active{opacity:.6}
.moved-lbl{font-family:var(--fm);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-right:12px;flex-shrink:0}

/* ── ADD BUTTON ── */
.add-btn{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:16px 18px;
  background:var(--white);border:1px solid var(--line2);
  border-radius:0 var(--R) var(--R) 0;
  cursor:pointer;margin-top:6px;
  transition:background .12s;
}
.add-btn:hover{background:var(--bg2)}
.add-btn-icon{
  width:36px;height:36px;border-radius:50%;
  background:var(--acc);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.add-btn-txt{font-family:var(--fm);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}

/* ── MODAL SHEET ── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.45);
  z-index:100;
  display:flex;align-items:flex-end;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{
  width:100%;max-width:560px;margin:0 auto;
  background:var(--white);
  border-radius:20px 20px 0 0;
  padding:0 0 max(24px,env(safe-area-inset-bottom)) 0;
  animation:slideUp .28s cubic-bezier(.32,1,.32,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--line2);border-radius:99px;margin:14px auto 20px}
.modal-title{font-family:var(--fh);font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.03em;padding:0 24px;margin-bottom:20px}
.modal-field{padding:0 24px;margin-bottom:16px}
.modal-label{font-family:var(--fm);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;display:block}
.modal-input{
  width:100%;padding:16px;
  background:var(--bg);border:1px solid var(--line2);
  font-family:var(--ff);font-size:16px;font-weight:500;
  color:var(--text);outline:none;
  border-radius:0;
  -webkit-appearance:none;
}
.modal-input:focus{border-color:var(--text)}
.modal-input::placeholder{color:var(--text3);font-size:15px;font-weight:400}
.modal-area-row{display:flex;gap:8px;flex-wrap:wrap;padding:0 24px;margin-bottom:24px}
.area-chip{
  padding:10px 16px;
  border:1.5px solid var(--line2);
  font-family:var(--fm);font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--text2);background:var(--bg);cursor:pointer;
  transition:all .15s;
}
.area-chip.sel{border-width:2px;color:var(--white);}
.modal-submit{
  margin:0 24px;width:calc(100% - 48px);padding:18px;
  background:var(--text);color:var(--white);border:none;
  font-family:var(--fh);font-size:16px;font-weight:700;letter-spacing:-.01em;
  cursor:pointer;border-radius:0 var(--R) var(--R) 0;
  transition:opacity .15s;
}
.modal-submit:hover{opacity:.88}
.modal-submit:active{opacity:.7}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--line2);margin-top:14px}
.stat{padding:12px 8px;text-align:center;border-right:1px solid var(--line2)}
.stat:last-child{border-right:none}
.stat-n{font-family:var(--fh);font-size:34px;font-weight:700;color:var(--text);letter-spacing:-.05em;line-height:1}
.stat-l{font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-top:3px}

/* ── EVENTS ── */
.ev-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);align-items:flex-start}
.ev-day{width:28px;flex-shrink:0;font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding-top:5px}
.ev-chips{flex:1;display:flex;flex-wrap:wrap;gap:6px;align-items:center;min-height:28px}
.ev-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:var(--white);border:1px solid var(--line2);border-left:2px solid var(--acc);font-family:var(--fm);font-size:11px;letter-spacing:.02em;color:var(--text)}
.ev-chip-plain{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:var(--white);border:1px solid var(--line2);font-family:var(--fm);font-size:11px;letter-spacing:.02em;color:var(--text)}
.ev-badge{font-family:var(--fm);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 5px;background:var(--acc-bg);color:var(--acc)}
.ev-time{font-family:var(--fm);font-size:10px;color:var(--text3);letter-spacing:.04em}
.ev-x{cursor:pointer;font-size:16px;color:var(--text3);line-height:1;margin-left:2px;padding:4px;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center}
.ev-empty{font-family:var(--fm);font-size:11px;color:var(--text3);letter-spacing:.04em}

/* ── GHOST for events/plan ── */
.ghost{border:1px dashed var(--line2);padding:13px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px}
.ghost input{flex:2;min-width:100px;border:none;background:transparent;outline:none;font-family:var(--fm);font-size:13px;letter-spacing:.02em;color:var(--text);padding:0}
.ghost input::placeholder{color:var(--text3)}
.gsel{font-family:var(--fm);font-size:11px;letter-spacing:.04em;padding:8px 10px;border:1px solid var(--line2);background:var(--white);color:var(--text2);cursor:pointer;min-height:44px}
.timein{width:62px;min-width:0;border:none;background:transparent;outline:none;font-family:var(--fm);font-size:13px;letter-spacing:.04em;color:var(--text2)}
.gadd{font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:10px 16px;border:1px solid var(--line2);background:var(--white);color:var(--text2);cursor:pointer;min-height:44px}
.gadd:hover{background:var(--bg2)}

/* ── PRIORITY CARDS ── */
.pcard{padding:16px 18px;background:var(--white);border:1px solid var(--line2);border-left:3px solid;margin-bottom:8px}
.pc1{border-left-color:var(--c1)}.pc2{border-left-color:var(--c2)}
.pc3{border-left-color:var(--c3)}.pc4{border-left-color:var(--c4)}
.pcard-area{font-family:var(--fm);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.pcard input{width:100%;border:none;border-bottom:1px solid var(--line2);background:transparent;padding:8px 0 6px;font-family:var(--ff);font-size:16px;font-weight:500;color:var(--text);outline:none}
.pcard input::placeholder{color:var(--text3);font-size:15px}
.pcard input:focus{border-bottom-color:var(--text)}
.hint-bar{padding:14px 16px;font-family:var(--fm);font-size:11px;letter-spacing:.03em;color:var(--text3);line-height:1.6;margin-top:4px;background:var(--white);border:1px solid var(--line2)}

/* ── DAY TABS ── */
.dtabs{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--line2);margin-bottom:14px}
.dt{padding:10px 3px;text-align:center;cursor:pointer;border-right:1px solid var(--line2);transition:background .1s;position:relative}
.dt:last-child{border-right:none}
.dt.sel{background:var(--white)}
.dt.sel::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc)}
.dt-d{font-family:var(--fm);font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.dt.sel .dt-d{color:var(--acc)}
.dt-n{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.03em;margin-top:2px}

/* ── PRIO REF ── */
.pref{margin-top:16px;padding:16px 18px;background:var(--white);border:1px solid var(--line2)}
.pref-title{font-family:var(--fm);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.pref-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.pref-bar{width:3px;height:18px;flex-shrink:0}
.pref-tag{font-family:var(--fm);font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border:1px solid;flex-shrink:0}
.pref-val{font-family:var(--ff);font-size:14px;font-weight:500;color:var(--text)}

/* ── MOVED POOL ── */
.mpool{padding:14px 16px;background:var(--white);border:1px solid var(--line2);margin-bottom:12px}
.mpool-t{font-family:var(--fm);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.mrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}

/* ── NAV ── */
.nav{padding:12px 20px;padding-bottom:max(16px,env(safe-area-inset-bottom));border-top:1px solid var(--line2);background:var(--bg);position:sticky;bottom:0;user-select:none;-webkit-user-select:none}
.nav-track{
  position:relative;height:60px;
  background:var(--bg2);border-radius:var(--R);border:1px solid var(--line2);
  display:flex;align-items:center;overflow:hidden;touch-action:none;cursor:grab;
}
.nav-track:active{cursor:grabbing}
.nav-hint-l{position:absolute;left:20px;font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);pointer-events:none;transition:opacity .2s}
.nav-hint-r{position:absolute;right:20px;font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);pointer-events:none;transition:opacity .2s}
.nav-step{position:absolute;left:50%;transform:translateX(-50%);font-family:var(--fm);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);white-space:nowrap;pointer-events:none;transition:opacity .2s}
.nav-circle{
  position:absolute;
  width:56px;height:56px;
  border-radius:var(--R);
  background:var(--acc);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 16px rgba(232,73,10,.40);
  will-change:left;cursor:inherit;
}
.nav-circle svg{pointer-events:none;transition:transform .15s}

/* ── FINISH ── */
.finish{padding:28px 20px;flex:1;display:flex;flex-direction:column;justify-content:center}
.fin-mark{font-family:var(--fh);font-size:80px;font-weight:700;color:var(--text);letter-spacing:-.06em;line-height:1;margin-bottom:8px}
.fin-mark span{color:var(--acc)}
.fin-t{font-family:var(--fh);font-size:26px;font-weight:700;color:var(--text);letter-spacing:-.03em;margin-bottom:5px}
.fin-s{font-family:var(--fm);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:28px}
.fin-rows{border:1px solid var(--line2)}
.fin-row{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line)}
.fin-row:last-child{border-bottom:none}
.fin-new{margin-top:16px;padding:18px;background:var(--text);font-family:var(--fm);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--white);text-align:center;cursor:pointer;min-height:56px;display:flex;align-items:center;justify-content:center}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:var(--white);font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:12px 22px;border-radius:var(--R);opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{font-family:var(--fm);font-size:11px;letter-spacing:.06em;color:var(--text3);padding:12px 0}
.loader{display:flex;gap:5px;padding:16px 0}
.ldot{width:5px;height:5px;background:var(--text3);animation:lb .8s infinite}
.ldot:nth-child(2){animation-delay:.13s}.ldot:nth-child(3){animation-delay:.26s}
@keyframes lb{0%,100%{opacity:.2;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="app" id="app"></div>

<script>
const SCOPES='https://www.googleapis.com/auth/calendar.events';
const CAL='https://www.googleapis.com/calendar/v3';

const A=[
  {id:'a1',n:'CREAM&CREAM', s:'CREAM&CREAM', col:'#E8490A'},
  {id:'a2',n:'ANOMALY',     s:'ANOMALY',     col:'#111110'},
  {id:'a3',n:'Personal',    s:'Personal',    col:'#6B6965'},
  {id:'a4',n:'Proyectos',   s:'Proyectos',   col:'#A8A5A0'},
];
const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DAYSU=['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
const ST=[
  {t:'Pendientes',  s:'¿Qué quedó sin resolver la semana pasada?'},
  {t:'Compromisos', s:'Tus eventos de Google Calendar esta semana'},
  {t:'Prioridades', s:'Lo que tiene que pasar sí o sí'},
  {t:'Plan semanal',s:'Asigná tareas a días concretos'},
];

let G={
  clientId:localStorage.getItem('s_cid')||'',
  token:(()=>{const t=localStorage.getItem('s_tok'),ts=parseInt(localStorage.getItem('s_ts')||'0');return t&&(Date.now()-ts<50*60*1000)?t:null;})(),
  userInfo:null,tokenClient:null,loaded:false,loading:false,
};
let S={
  step:0,finished:false,
  tasks:[
    {id:1,txt:'Revisar costeo temporada',a:'a1',st:'p'},
    {id:2,txt:'Responder a Diego – reunión',a:'a2',st:'p'},
    {id:3,txt:'Turno médico',a:'a3',st:'p'},
    {id:4,txt:'Avanzar packaging nuevo',a:'a4',st:'p'},
    {id:5,txt:'Control stock insumos',a:'a1',st:'p'},
  ],
  events:[],
  prio:{a1:'',a2:'',a3:'',a4:''},
  plan:{Dom:[],Lun:[],Mar:[],Mié:[],Jue:[],Vie:[],Sáb:[]},
  sel:'Lun',
  modal:null, // 'task' | 'event' | 'plan'
  modalArea:'a1',
};

function wb(){const now=new Date(),d=now.getDay(),mon=new Date(now);mon.setDate(now.getDate()-(d===0?6:d-1));mon.setHours(0,0,0,0);const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);return{mon,sun};}
function wr(){const{mon,sun}=wb();const f=d=>d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'});return`${f(mon)} — ${f(sun)}.${mon.getFullYear()}`;}
function dfl(s){if(!s)return'?';return DAYS[new Date(s+'T12:00:00').getDay()];}
function ar(id){return A.find(x=>x.id===id)||A[0];}
function toast(m,ms=2400){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms);}

function arrowSVG(color,size=18){
  return`<svg width="${size}" height="${size}" viewBox="0 0 18 18" fill="none">
    <path d="M3 9h12" stroke="${color}" stroke-width="2" stroke-linecap="round"/>
    <path d="M10 5l5 4-5 4" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function plusSVG(){
  return`<svg width="20" height="20" viewBox="0 0 20 20" fill="none">
    <path d="M10 4v12M4 10h12" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  </svg>`;
}

/* Google Auth */
function initAuth(){
  if(!G.clientId||!window.google)return;
  G.tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:G.clientId,scope:SCOPES,
    callback:async r=>{
      if(r.error){toast('error al conectar');return;}
      G.token=r.access_token;
      localStorage.setItem('s_tok',r.access_token);
      localStorage.setItem('s_ts',Date.now().toString());
      await fetchUser();fetchEvents();
    }
  });
}
function reqAuth(){if(G.tokenClient)G.tokenClient.requestAccessToken({prompt:''});}
async function fetchUser(){
  if(!G.token)return;
  try{const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:`Bearer ${G.token}`}});G.userInfo=await r.json();render();}catch(e){}
}
async function fetchEvents(){
  if(!G.token)return;
  G.loading=true;render();
  const{mon,sun}=wb();
  const p=new URLSearchParams({timeMin:mon.toISOString(),timeMax:sun.toISOString(),singleEvents:true,orderBy:'startTime',maxResults:50});
  try{
    const r=await fetch(`${CAL}/calendars/primary/events?${p}`,{headers:{Authorization:`Bearer ${G.token}`}});
    const d=await r.json();
    const evs=(d.items||[]).map(e=>({id:'gc_'+e.id,gcalId:e.id,tit:e.summary||'(sin título)',day:dfl(e.start?.date||e.start?.dateTime?.slice(0,10)),time:e.start?.dateTime?new Date(e.start.dateTime).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}):'',tp:'e',fromGcal:true}));
    S.events=[...S.events.filter(e=>!e.fromGcal),...evs];
    G.loaded=true;G.loading=false;toast(`${evs.length} eventos importados`);render();
  }catch(e){G.loading=false;toast('error al leer calendar');render();}
}
async function createCalEv(title,day,time,tp){
  if(!G.token)return null;
  const{mon}=wb();const di=DAYS.indexOf(day);const diff=di===0?6:di-1;
  const date=new Date(mon);date.setDate(mon.getDate()+diff);const ds=date.toISOString().slice(0,10);
  let body={summary:title};
  if(tp==='e'&&time){const[h,m]=(time||'09:00').split(':').map(Number);const st=new Date(date);st.setHours(h||9,m||0,0,0);const en=new Date(st);en.setHours(st.getHours()+1);body.start={dateTime:st.toISOString(),timeZone:'America/Argentina/Buenos_Aires'};body.end={dateTime:en.toISOString(),timeZone:'America/Argentina/Buenos_Aires'};}
  else{body.start={date:ds};body.end={date:ds};}
  try{const r=await fetch(`${CAL}/calendars/primary/events`,{method:'POST',headers:{Authorization:`Bearer ${G.token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});const ev=await r.json();toast('guardado en calendar');return ev.id;}
  catch(e){toast('no se pudo guardar');return null;}
}
async function deleteCalEv(gcalId){
  if(!G.token||!gcalId)return;
  try{await fetch(`${CAL}/calendars/primary/events/${gcalId}`,{method:'DELETE',headers:{Authorization:`Bearer ${G.token}`}});toast('eliminado de calendar');}catch(e){}
}

/* Render */
function render(){
  const el=document.getElementById('app');
  if(!G.clientId||!G.token){el.innerHTML=authHTML();return;}
  if(S.finished){el.innerHTML=finishHTML();return;}

  el.innerHTML=`
    <div class="hdr">
      <div class="hdr-top">
        <span class="hdr-date">${wr()}</span>
        <div class="hdr-right">
          ${G.userInfo?`<div class="user-chip" onclick="signOut()">
            ${G.userInfo.picture?`<img class="user-av" src="${G.userInfo.picture}" alt="">`:`<div class="user-av"></div>`}
            <span class="user-nm">${(G.userInfo.given_name||'yo').toUpperCase()}</span>
          </div>`:''}
          <div class="hchip">
            <div class="hchip-dot" style="background:${G.loading?'#F2A42A':G.loaded?'var(--acc)':'var(--text3)'}"></div>
            <span class="hchip-lbl">${G.loading?'SYNC':G.loaded?'CAL':'—'}</span>
          </div>
        </div>
      </div>
      <div class="hdr-kicker">Ritual semanal — ${new Date().getFullYear()}</div>
      <div class="hdr-title">Revisión<br>semanal<span>.</span></div>
      <div class="area-tabs">
        ${A.map(a=>`<div class="atab ${S.step===0&&S.tasks.some(t=>t.a===a.id&&t.st==='p')?'on':''}">${a.s}</div>`).join('')}
      </div>
    </div>
    <div class="steps">
      ${ST.map((s,i)=>`
        <div class="sn ${i===S.step?'on':''} ${i<S.step?'done':''}" onclick="if(${i}<=${S.step})gs(${i})">
          <div class="sn-bar"></div>
          <div class="sn-num">${i<S.step?'✓':'0'+(i+1)}</div>
          <div class="sn-lbl">${s.t}</div>
        </div>`).join('')}
    </div>
    <div class="body">
      <div class="step-num">PASO 0${S.step+1} / 04</div>
      <div class="step-head-row">
        <div><div class="step-t">${ST[S.step].t}</div></div>
        ${S.step===1?`<button class="sync-btn" onclick="fetchEvents()">${G.loading?'…':'↻ SYNC'}</button>`:''}
      </div>
      <div class="step-s">${ST[S.step].s}</div>
      ${[step0,step1,step2,step3][S.step]()}
    </div>
    <div class="nav">
      <div class="nav-track" id="navTrack">
        <span class="nav-hint-l" id="hintL" style="opacity:${S.step===0?.12:1}">${S.step===0?'INICIO':'← ATRÁS'}</span>
        <span class="nav-step" id="navStep">${S.step+1} / 4</span>
        <span class="nav-hint-r" id="hintR" style="opacity:${S.step===3?.12:1}">${S.step===3?'CERRAR':'SIGUIENTE →'}</span>
        <div class="nav-circle" id="navCircle">
          ${arrowSVG('white',20)}
        </div>
      </div>
    </div>
    ${S.modal?modalHTML():''}`;

  requestAnimationFrame(initSwipe);
}

function taskCard(t){
  const a=ar(t.a);
  const done=t.st==='d';
  const moved=t.st==='m';
  return`<div class="tcard ${done?'done':''}">
    <div class="tc-bar" style="background:${a.col}"></div>
    <div class="chk-wrap" onclick="toggleT(${t.id})">
      <div class="chk-c" style="${done?`background:${a.col};border:none`:``}">
        ${done?`<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 5.5l2.5 3L9 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
      </div>
    </div>
    <span class="ttxt ${done?'x':''}">${t.txt}</span>
    <span class="ttag" style="padding-right:${!done&&!moved?'6px':'12px'}">${a.s}</span>
    ${!done&&!moved?`
      <button class="tmv" style="border-color:${a.col}" onclick="moveT(${t.id})">
        ${arrowSVG(a.col,15)}
      </button>`:''}
    ${moved?`<span class="moved-lbl">MOV.</span>`:''}
    ${done?`<div style="width:51px;flex-shrink:0"></div>`:''}
  </div>`;
}

function step0(){
  return`<div>
    ${S.tasks.map(t=>taskCard(t)).join('')}
    <button class="add-btn" onclick="openModal('task')">
      <div class="add-btn-icon">${plusSVG()}</div>
      <span class="add-btn-txt">Agregar pendiente</span>
    </button>
    <div class="stats">
      <div class="stat"><div class="stat-n">${S.tasks.filter(t=>t.st==='d').length}</div><div class="stat-l">Hechas</div></div>
      <div class="stat"><div class="stat-n">${S.tasks.filter(t=>t.st==='p').length}</div><div class="stat-l">Pend.</div></div>
      <div class="stat"><div class="stat-n">${S.tasks.filter(t=>t.st==='m').length}</div><div class="stat-l">Mov.</div></div>
    </div>
  </div>`;}

function step1(){
  return`<div>
    ${G.loading?`<div class="loader"><div class="ldot"></div><div class="ldot"></div><div class="ldot"></div></div>`:''}
    ${DAYS.map((d,i)=>{const ev=S.events.filter(e=>e.day===d);return`
      <div class="ev-row">
        <div class="ev-day">${DAYSU[i]}</div>
        <div class="ev-chips">
          ${ev.length?ev.map(e=>`
            <div class="${e.fromGcal?'ev-chip':'ev-chip-plain'}">
              ${e.fromGcal?`<span class="ev-badge">CAL</span>`:`<span style="font-family:var(--fm);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--text3)">${e.tp==='e'?'EVT':'TAR'}</span>`}
              ${e.tit}
              ${e.time?`<span class="ev-time">${e.time}</span>`:''}
              <span class="ev-x" onclick="delEv('${e.id}','${e.gcalId||''}')">×</span>
            </div>`).join(''):`<span class="ev-empty">—</span>`}
        </div>
      </div>`}).join('')}
    <button class="add-btn" style="margin-top:8px" onclick="openModal('event')">
      <div class="add-btn-icon">${plusSVG()}</div>
      <span class="add-btn-txt">Agregar compromiso</span>
    </button>
  </div>`;}

function step2(){
  return`<div>
    ${A.map(a=>`
      <div class="pcard ${a.id==='a1'?'pc1':a.id==='a2'?'pc2':a.id==='a3'?'pc3':'pc4'}">
        <div class="pcard-area">${a.n}</div>
        <input type="text" placeholder="Prioridad de la semana..." value="${S.prio[a.id]}" oninput="S.prio['${a.id}']=this.value">
      </div>`).join('')}
    <div class="hint-bar">Una sola prioridad por área — si hay más de una, la semana queda dispersa.</div>
  </div>`;}

function step3(){
  const items=S.plan[S.sel]||[];
  const moved=S.tasks.filter(t=>t.st==='m');
  return`<div>
    <div class="dtabs">
      ${DAYS.map((d,i)=>`
        <div class="dt ${d===S.sel?'sel':''}" onclick="selDay('${d}')">
          <div class="dt-d">${DAYSU[i]}</div>
          <div class="dt-n">${(S.plan[d]||[]).length||'—'}</div>
        </div>`).join('')}
    </div>
    <div style="min-height:48px;margin-bottom:10px">
      ${items.length?items.map((t,i)=>{const a=ar(t.a);return`
        <div class="tcard">
          <div class="tc-bar" style="background:${a.col}"></div>
          <div class="chk-wrap"><div class="chk-c"></div></div>
          <span class="ttxt">${t.txt}</span>
          <span class="ttag" style="padding-right:4px">${a.s}</span>
          ${t.gcalId?`<span class="ev-badge" style="margin-right:6px;font-size:9px">CAL</span>`:''}
          <span class="ev-x" onclick="delPlan('${S.sel}',${i})">×</span>
        </div>`}).join(''):`<div class="empty">Sin ítems para el ${S.sel}.</div>`}
    </div>
    ${moved.length?`
      <div class="mpool">
        <div class="mpool-t">Pendientes para asignar</div>
        ${moved.map(t=>{const a=ar(t.a);return`<div class="mrow">
          <div style="width:3px;height:18px;background:${a.col};flex-shrink:0"></div>
          <span style="font-family:var(--fm);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);width:80px;flex-shrink:0">${a.s}</span>
          <span style="flex:1;font-family:var(--ff);font-size:14px;font-weight:500;color:var(--text)">${t.txt}</span>
          <button class="gadd" onclick="assignMoved(${t.id})">+ ${S.sel}</button>
        </div>`;}).join('')}
      </div>`:''}
    <button class="add-btn" onclick="openModal('plan')">
      <div class="add-btn-icon">${plusSVG()}</div>
      <span class="add-btn-txt">Agregar al ${S.sel}</span>
    </button>
    ${Object.values(S.prio).some(Boolean)?`
      <div class="pref">
        <div class="pref-title">PRIORIDADES DE LA SEMANA</div>
        ${A.map(a=>S.prio[a.id]?`<div class="pref-row">
          <div class="pref-bar" style="background:${a.col}"></div>
          <span class="pref-tag" style="color:${a.col};border-color:${a.col}30">${a.s}</span>
          <span class="pref-val">${S.prio[a.id]}</span>
        </div>`:'').join('')}
      </div>`:''}
  </div>`;}

/* Modal */
function modalHTML(){
  const type=S.modal;
  const isTask=type==='task';
  const isEvent=type==='event';
  const isPlan=type==='plan';
  const title=isTask?'Nueva tarea':isEvent?'Nuevo compromiso':`Agregar al ${S.sel}`;

  return`<div class="modal-overlay" onclick="closeModalIfOutside(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title">${title}</div>

      <div class="modal-field">
        <label class="modal-label">${isTask?'Tarea':isEvent?'Nombre del compromiso':'Tarea o evento'}</label>
        <input class="modal-input" type="text" id="modalTxt"
          placeholder="${isTask?'¿Qué hay que hacer?':isEvent?'Reunión, llamada, entrega...':'Nombre...'}"
          autofocus>
      </div>

      ${isEvent||isPlan?`
        <div class="modal-field">
          <label class="modal-label">Día</label>
          <select class="modal-input" id="modalDay" style="cursor:pointer;color:var(--text)">
            ${DAYS.map((d,i)=>`<option value="${d}" ${d===S.sel?'selected':''}>${DAYSU[i]}</option>`).join('')}
          </select>
        </div>
        <div class="modal-field">
          <label class="modal-label">Hora (opcional)</label>
          <input class="modal-input" type="text" id="modalTime" placeholder="ej. 10:00">
        </div>
        <div class="modal-field">
          <label class="modal-label">Tipo</label>
          <select class="modal-input" id="modalTp" style="cursor:pointer;color:var(--text)">
            <option value="e">Evento</option>
            <option value="t">Tarea</option>
          </select>
        </div>`:''}

      <div class="modal-field">
        <label class="modal-label">Área</label>
      </div>
      <div class="modal-area-row">
        ${A.map(a=>`
          <div class="area-chip ${S.modalArea===a.id?'sel':''}"
            style="${S.modalArea===a.id?`background:${a.col};border-color:${a.col}`:''}"
            onclick="selModalArea('${a.id}')">
            ${a.s}
          </div>`).join('')}
      </div>

      <button class="modal-submit" onclick="submitModal()">
        Agregar →
      </button>
    </div>
  </div>`;}

function openModal(type){S.modal=type;S.modalArea='a1';render();setTimeout(()=>document.getElementById('modalTxt')?.focus(),100);}
function closeModal(){S.modal=null;render();}
function closeModalIfOutside(e){if(e.target.classList.contains('modal-overlay'))closeModal();}
function selModalArea(id){S.modalArea=id;const chips=document.querySelectorAll('.area-chip');chips.forEach((c,i)=>{const a=A[i];c.classList.toggle('sel',a.id===id);c.style.background=a.id===id?a.col:'';c.style.borderColor=a.id===id?a.col:'';c.style.color=a.id===id?'white':'';}); S.modalArea=id;}

async function submitModal(){
  const txt=document.getElementById('modalTxt')?.value?.trim();
  if(!txt){toast('escribí algo primero');return;}
  const type=S.modal;
  const area=S.modalArea;

  if(type==='task'){
    S.tasks.push({id:Date.now(),txt,a:area,st:'p'});
    toast('tarea agregada');
  } else if(type==='event'){
    const day=document.getElementById('modalDay')?.value||'Lun';
    const time=document.getElementById('modalTime')?.value?.trim()||'';
    const tp=document.getElementById('modalTp')?.value||'e';
    let gcalId=null;
    if(G.token&&G.token!=='skip')gcalId=await createCalEv(txt,day,time,tp);
    S.events.push({id:'m'+Date.now(),gcalId,tit:txt,day,time,tp,fromGcal:false});
    toast('compromiso agregado');
  } else if(type==='plan'){
    const day=document.getElementById('modalDay')?.value||S.sel;
    const time=document.getElementById('modalTime')?.value?.trim()||'';
    const tp=document.getElementById('modalTp')?.value||'t';
    let gcalId=null;
    if(G.token&&G.token!=='skip')gcalId=await createCalEv(txt,day,time,tp);
    if(!S.plan[day])S.plan[day]=[];
    S.plan[day].push({txt,a:area,id:Date.now(),gcalId});
    S.sel=day;
    toast('ítem agregado');
  }
  closeModal();
}

function finishHTML(){
  return`<div class="finish">
    <div class="fin-mark">✓<span>.</span></div>
    <div class="fin-t">Semana planificada</div>
    <div class="fin-s">${wr()} · ${Object.values(S.prio).filter(Boolean).length} prioridades</div>
    ${Object.values(S.prio).some(Boolean)?`<div class="fin-rows">
      ${A.map(a=>S.prio[a.id]?`<div class="fin-row">
        <div style="width:3px;height:18px;background:${a.col};flex-shrink:0"></div>
        <span style="font-family:var(--fm);font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:${a.col};border:1px solid ${a.col}30;padding:3px 10px;flex-shrink:0">${a.s}</span>
        <span style="font-family:var(--ff);font-size:15px;font-weight:500;color:var(--text)">${S.prio[a.id]}</span>
      </div>`:'').join('')}
    </div>`:''}
    <div class="fin-new" onclick="resetApp()">NUEVA SEMANA →</div>
  </div>`;}

        <button class="auth-cta" onclick="reqAuth()">Conectar con Google Calendar</button>

/* Swipe nav */
function initSwipe(){
  const circle=document.getElementById('navCircle');
  const track=document.getElementById('navTrack');
  if(!circle||!track)return;
  const R=28;
  const trackW=track.offsetWidth;
  const circD=R*2;
  const mid=(trackW-circD)/2;
  const maxX=trackW-circD-2;
  const threshold=trackW*0.30;
  let dragging=false,startX=0;
  const hL=document.getElementById('hintL');
  const hR=document.getElementById('hintR');
  const ns=document.getElementById('navStep');
  const svg=circle.querySelector('svg');
  circle.style.left=mid+'px';

  function setPos(x,anim){
    x=Math.max(2,Math.min(maxX,x));
    circle.style.transition=anim?'left .38s cubic-bezier(.34,1.56,.64,1)':'none';
    circle.style.left=x+'px';
    const prog=(x-mid)/(maxX-mid);
    if(svg)svg.style.transform=prog<-0.1?'rotate(180deg)':'rotate(0deg)';
    const fadeL=x<mid?Math.max(0,1-(mid-x)/mid*2):(S.step===0?.12:1);
    const fadeR=x>mid?Math.max(0,1-(x-mid)/(maxX-mid)*2):(S.step===3?.12:1);
    if(hL)hL.style.opacity=fadeL;
    if(hR)hR.style.opacity=fadeR;
    if(ns)ns.style.opacity=Math.max(0,1-Math.abs(x-mid)/mid*1.5);
  }
  function onStart(cx){dragging=true;startX=cx-parseFloat(circle.style.left||mid);circle.style.transition='none';}
  function onMove(cx){if(!dragging)return;setPos(cx-startX,false);}
  function onEnd(){
    if(!dragging)return;dragging=false;
    const x=parseFloat(circle.style.left);
    if(x>mid+threshold){if(S.step<3)next();else if(S.step===3)fin();else setPos(mid,true);return;}
    if(x<mid-threshold){if(S.step>0)prev();else setPos(mid,true);return;}
    setPos(mid,true);
  }
  circle.addEventListener('touchstart',e=>{onStart(e.touches[0].clientX);e.preventDefault();},{passive:false});
  window.addEventListener('touchmove',e=>{if(dragging){onMove(e.touches[0].clientX);e.preventDefault();}},{passive:false});
  window.addEventListener('touchend',onEnd);
  circle.addEventListener('mousedown',e=>onStart(e.clientX));
  window.addEventListener('mousemove',e=>{if(dragging)onMove(e.clientX);});
  window.addEventListener('mouseup',onEnd);

  // Close modal on escape
  window.addEventListener('keydown',e=>{if(e.key==='Escape'&&S.modal)closeModal();});
}

function gs(i){S.step=i;render();}
function next(){if(S.step<3){S.step++;render();}}
function prev(){if(S.step>0){S.step--;render();}}
function selDay(d){S.sel=d;render();}
function toggleT(id){const t=S.tasks.find(x=>x.id===id);if(t){t.st=t.st==='d'?'p':'d';render();}}
function moveT(id){const t=S.tasks.find(x=>x.id===id);if(t){t.st='m';render();}}
async function delEv(id,gcalId){S.events=S.events.filter(e=>e.id!==id);if(gcalId&&G.token&&G.token!=='skip')await deleteCalEv(gcalId);render();}
function delPlan(day,i){S.plan[day].splice(i,1);render();}
async function assignMoved(id){
  const t=S.tasks.find(x=>x.id===id);if(!t)return;
  let gcalId=null;if(G.token&&G.token!=='skip')gcalId=await createCalEv(t.txt,S.sel,'','t');
  if(!S.plan[S.sel])S.plan[S.sel]=[];
  S.plan[S.sel].push({txt:t.txt,a:t.a,id:Date.now(),gcalId});t.st='planned';render();
}
function fin(){S.finished=true;render();}
function resetApp(){
  S.step=0;S.finished=false;S.modal=null;
  S.prio={a1:'',a2:'',a3:'',a4:''};
  S.plan={Dom:[],Lun:[],Mar:[],Mié:[],Jue:[],Vie:[],Sáb:[]};
  S.tasks.forEach(t=>{if(t.st!=='d')t.st='p';});
  render();if(G.token&&G.token!=='skip')fetchEvents();
}
function saveCid(){const v=document.getElementById('cid')?.value?.trim();if(!v){toast('pegá tu client id');return;}G.clientId=v;localStorage.setItem('s_cid',v);render();setTimeout(()=>initAuth(),600);}
function resetCid(){G.clientId='';G.token=null;G.userInfo=null;localStorage.removeItem('s_cid');localStorage.removeItem('s_tok');localStorage.removeItem('s_ts');render();}
function skipAuth(){G.token='skip';render();}
function signOut(){if(confirm('¿Desconectar Google?')){G.token=null;G.userInfo=null;G.loaded=false;localStorage.removeItem('s_tok');localStorage.removeItem('s_ts');S.events=S.events.filter(e=>!e.fromGcal);render();}}

render();
window.addEventListener('load',()=>setTimeout(()=>{
  if(G.clientId&&window.google)initAuth();
  if(G.token&&G.token!=='skip'){fetchUser();fetchEvents();}
},800));
</script>
