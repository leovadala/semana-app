<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Semana</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Semana">
<meta name="theme-color" content="#EDECEA">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/syne/index.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dm-mono/index.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource-variable/plus-jakarta-sans/index.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --fh:'Syne',sans-serif;
  --fm:'DM Mono',monospace;
  --ff:'Plus Jakarta Sans Variable',sans-serif;
  --bg:#EDECEA;--bg2:#E4E2DF;--card:#F7F5F2;--white:#FFFFFF;
  --text:#111110;--text2:#6B6965;--text3:#A8A5A0;
  --line:rgba(0,0,0,0.08);--line2:rgba(0,0,0,0.16);
  --acc:#E8490A;--acc-bg:#FCE8E0;
  --c1:#E8490A;--c2:#111110;--c3:#6B6965;--c4:#A8A5A0;
  --R:27px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--ff);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;min-height:100dvh}
.app{display:flex;flex-direction:column;flex:1;max-width:540px;width:100%;margin:0 auto;min-height:100dvh}

/* AUTH */
.auth{display:flex;flex-direction:column;flex:1;padding:max(env(safe-area-inset-top),32px) 24px 40px}
.auth-logo{margin-bottom:28px}
.auth-kicker{font-family:var(--fm);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.auth-h{font-family:var(--fh);font-size:44px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:.9;margin-bottom:6px}
.auth-h span{color:var(--acc)}
.auth-sub{font-family:var(--fm);font-size:11px;letter-spacing:.02em;color:var(--text3);line-height:1.7;margin-bottom:32px}
.auth-steps{display:flex;flex-direction:column;margin-bottom:24px;border:1px solid var(--line2);background:var(--white)}
.auth-step{display:flex;gap:14px;padding:13px 16px;border-bottom:1px solid var(--line);font-family:var(--fm);font-size:11px;letter-spacing:.02em;color:var(--text2);line-height:1.5;align-items:flex-start}
.auth-step:last-child{border-bottom:none}
.auth-sn{color:var(--acc);min-width:18px;font-size:10px;padding-top:1px}
.auth-step a{color:var(--text);text-decoration:underline;text-underline-offset:3px}
.auth-box{background:var(--white);border:1px solid var(--line2);padding:18px;margin-bottom:12px}
.auth-box-lbl{font-family:var(--fm);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.auth-input{width:100%;background:var(--bg);border:1px solid var(--line2);padding:12px 14px;font-family:var(--fm);font-size:12px;letter-spacing:.04em;color:var(--text);outline:none;margin-bottom:12px}
.auth-input:focus{border-color:var(--text)}
.auth-input::placeholder{color:var(--text3)}
.auth-cta{width:100%;padding:14px;background:var(--text);color:var(--white);border:none;font-family:var(--fh);font-size:15px;font-weight:700;letter-spacing:-.01em;cursor:pointer;transition:opacity .15s}
.auth-cta:hover{opacity:.88}
.auth-skip{font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);cursor:pointer;text-align:center;display:block;margin-top:14px}

/* HEADER */
.hdr{padding:max(env(safe-area-inset-top),18px) 20px 0;border-bottom:1px solid var(--line2)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.hdr-date{font-family:var(--fm);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.hdr-right{display:flex;gap:6px;align-items:center}
.hchip{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;background:var(--white);border:1px solid var(--line2)}
.hchip-dot{width:5px;height:5px;border-radius:50%;background:var(--acc)}
.hchip-lbl{font-family:var(--fm);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}
.user-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px 3px 4px;background:var(--white);border:1px solid var(--line2);cursor:pointer}
.user-av{width:20px;height:20px;border-radius:50%;object-fit:cover;background:var(--bg2);flex-shrink:0}
.user-nm{font-family:var(--fm);font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}
.hdr-kicker{font-family:var(--fm);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.hdr-title{font-family:var(--fh);font-size:36px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:.9;margin-bottom:14px}
.hdr-title span{color:var(--acc)}
.area-tabs{display:flex;border-top:1px solid var(--line2)}
.atab{flex:1;padding:8px 4px;text-align:center;font-family:var(--fm);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-right:1px solid var(--line2);position:relative}
.atab:last-child{border-right:none}
.atab.on{color:var(--text);background:var(--white)}
.atab.on::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc)}

/* STEPS */
.steps{display:flex;border-bottom:1px solid var(--line2)}
.sn{flex:1;padding:9px 8px;cursor:pointer;border-right:1px solid var(--line2);position:relative;transition:background .12s}
.sn:last-child{border-right:none}
.sn.on{background:var(--white)}
.sn-bar{position:absolute;top:0;left:0;right:0;height:2px;background:transparent}
.sn.on .sn-bar{background:var(--acc)}
.sn-num{font-family:var(--fm);font-size:8px;letter-spacing:.12em;color:var(--text3);margin-bottom:3px}
.sn.on .sn-num{color:var(--acc)}
.sn.done .sn-num{color:var(--text2)}
.sn-lbl{font-family:var(--fh);font-size:10px;font-weight:700;color:var(--text3);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sn.on .sn-lbl{color:var(--text)}

/* BODY */
.body{padding:16px 20px 12px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.step-num{font-family:var(--fm);font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.step-head-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.step-t{font-family:var(--fh);font-size:24px;font-weight:700;color:var(--text);letter-spacing:-.03em;line-height:1;margin-bottom:3px}
.step-s{font-family:var(--fm);font-size:9px;letter-spacing:.04em;color:var(--text3);margin-bottom:14px;line-height:1.5}
.sync-btn{font-family:var(--fm);font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:7px 12px;background:var(--white);border:1px solid var(--line2);color:var(--text2);cursor:pointer;flex-shrink:0;margin-top:2px}

/* TASK CARDS — asymmetric pill, left flat, right rounded */
.tcard{
  display:flex;align-items:center;gap:0;
  height:54px;
  background:var(--white);
  border:1px solid var(--line2);
  border-radius:0 var(--R) var(--R) 0;
  margin-bottom:7px;
  overflow:hidden;
  transition:opacity .2s;
}
.tcard.done{opacity:.30}
.tc-bar{width:4px;height:100%;flex-shrink:0;align-self:stretch}
/* Circular checkbox */
.chk-wrap{width:50px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.chk-c{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line2);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ttxt{flex:1;font-family:var(--ff);font-size:14px;font-weight:500;color:var(--text);line-height:1.3;padding-right:6px}
.ttxt.x{text-decoration:line-through;color:var(--text3)}
.ttag{font-family:var(--fm);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);flex-shrink:0}
/* Move button — perfect circle, outline, arrow in area color */
.tmv{
  width:40px;height:40px;min-width:40px;min-height:40px;
  border-radius:50%;border:1.5px solid;
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;
  margin-right:7px;padding:0;
}
.tmv:hover{opacity:.7}
.moved-lbl{font-family:var(--fm);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-right:10px;flex-shrink:0}

/* GHOST */
.ghost{border:1px dashed var(--line2);padding:11px 13px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:4px}
.ghost input{flex:2;min-width:100px;border:none;background:transparent;outline:none;font-family:var(--fm);font-size:11px;letter-spacing:.02em;color:var(--text);padding:0}
.ghost input::placeholder{color:var(--text3)}
.gsel{font-family:var(--fm);font-size:10px;letter-spacing:.04em;padding:6px 8px;border:1px solid var(--line2);background:var(--white);color:var(--text2);cursor:pointer}
.timein{width:58px;min-width:0;border:none;background:transparent;outline:none;font-family:var(--fm);font-size:11px;letter-spacing:.04em;color:var(--text2)}
.gadd{font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:7px 12px;border:1px solid var(--line2);background:var(--white);color:var(--text2);cursor:pointer}
.gadd:hover{background:var(--bg2)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--line2);margin-top:12px}
.stat{padding:10px 8px;text-align:center;border-right:1px solid var(--line2)}
.stat:last-child{border-right:none}
.stat-n{font-family:var(--fh);font-size:30px;font-weight:700;color:var(--text);letter-spacing:-.05em;line-height:1}
.stat-l{font-family:var(--fm);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-top:2px}

/* EVENTS */
.ev-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);align-items:flex-start}
.ev-day{width:26px;flex-shrink:0;font-family:var(--fm);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding-top:4px}
.ev-chips{flex:1;display:flex;flex-wrap:wrap;gap:5px;align-items:center;min-height:24px}
.ev-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 9px;background:var(--white);border:1px solid var(--line2);border-left:2px solid var(--acc);font-family:var(--fm);font-size:10px;letter-spacing:.02em;color:var(--text)}
.ev-chip-plain{display:inline-flex;align-items:center;gap:5px;padding:5px 9px;background:var(--white);border:1px solid var(--line2);font-family:var(--fm);font-size:10px;letter-spacing:.02em;color:var(--text)}
.ev-badge{font-family:var(--fm);font-size:8px;letter-spacing:.08em;text-transform:uppercase;padding:1px 4px;background:var(--acc-bg);color:var(--acc)}
.ev-time{font-family:var(--fm);font-size:9px;color:var(--text3);letter-spacing:.04em}
.ev-x{cursor:pointer;font-size:14px;color:var(--text3);line-height:1;margin-left:2px}
.ev-x:hover{color:var(--text)}
.ev-empty{font-family:var(--fm);font-size:10px;color:var(--text3);letter-spacing:.04em}

/* PRIORITY CARDS */
.pcard{padding:13px 15px;background:var(--white);border:1px solid var(--line2);border-left:3px solid;margin-bottom:7px}
.pc1{border-left-color:var(--c1)}.pc2{border-left-color:var(--c2)}
.pc3{border-left-color:var(--c3)}.pc4{border-left-color:var(--c4)}
.pcard-area{font-family:var(--fm);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
.pcard input{width:100%;border:none;border-bottom:1px solid var(--line2);background:transparent;padding:6px 0 5px;font-family:var(--ff);font-size:15px;font-weight:500;color:var(--text);outline:none}
.pcard input::placeholder{color:var(--text3);font-size:13px}
.pcard input:focus{border-bottom-color:var(--text)}
.hint-bar{padding:12px 14px;font-family:var(--fm);font-size:10px;letter-spacing:.03em;color:var(--text3);line-height:1.6;margin-top:4px;background:var(--white);border:1px solid var(--line2)}

/* DAY TABS */
.dtabs{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--line2);margin-bottom:12px}
.dt{padding:8px 3px;text-align:center;cursor:pointer;border-right:1px solid var(--line2);transition:background .1s;position:relative}
.dt:last-child{border-right:none}
.dt.sel{background:var(--white)}
.dt.sel::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc)}
.dt-d{font-family:var(--fm);font-size:7px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.dt.sel .dt-d{color:var(--acc)}
.dt-n{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.03em;margin-top:2px}

/* PRIO REF — plan step, bigger area tags in color */
.pref{margin-top:14px;padding:13px 15px;background:var(--white);border:1px solid var(--line2)}
.pref-title{font-family:var(--fm);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.pref-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.pref-bar{width:3px;height:16px;flex-shrink:0}
.pref-tag{font-family:var(--fm);font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border:1px solid;flex-shrink:0}
.pref-val{font-family:var(--ff);font-size:13px;font-weight:500;color:var(--text)}

/* MOVED POOL */
.mpool{padding:12px 14px;background:var(--white);border:1px solid var(--line2);margin-bottom:10px}
.mpool-t{font-family:var(--fm);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.mrow{display:flex;align-items:center;gap:8px;margin-bottom:7px}

/* NAV — pill both sides rounded, circle same R */
.nav{padding:10px 20px;padding-bottom:max(16px,env(safe-area-inset-bottom));border-top:1px solid var(--line2);background:var(--bg);position:sticky;bottom:0;user-select:none;-webkit-user-select:none}
.nav-track{
  position:relative;height:56px;
  background:var(--bg2);border-radius:var(--R);border:1px solid var(--line2);
  display:flex;align-items:center;overflow:hidden;touch-action:none;cursor:grab;
}
.nav-track:active{cursor:grabbing}
.nav-hint-l{position:absolute;left:18px;font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);pointer-events:none;transition:opacity .2s}
.nav-hint-r{position:absolute;right:18px;font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);pointer-events:none;transition:opacity .2s}
.nav-step{position:absolute;left:50%;transform:translateX(-50%);font-family:var(--fm);font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);white-space:nowrap;pointer-events:none;transition:opacity .2s}
.nav-circle{
  position:absolute;
  width:54px;height:54px;
  border-radius:var(--R);
  background:var(--acc);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 14px rgba(232,73,10,.38);
  will-change:left;cursor:inherit;
}
.nav-circle svg{pointer-events:none;transition:transform .15s}

/* FINISH */
.finish{padding:24px 20px;flex:1;display:flex;flex-direction:column;justify-content:center}
.fin-mark{font-family:var(--fh);font-size:72px;font-weight:700;color:var(--text);letter-spacing:-.06em;line-height:1;margin-bottom:6px}
.fin-mark span{color:var(--acc)}
.fin-t{font-family:var(--fh);font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.03em;margin-bottom:4px}
.fin-s{font-family:var(--fm);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:24px}
.fin-rows{border:1px solid var(--line2)}
.fin-row{display:flex;align-items:center;gap:12px;padding:12px 15px;border-bottom:1px solid var(--line)}
.fin-row:last-child{border-bottom:none}
.fin-new{margin-top:14px;padding:14px 18px;background:var(--text);font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--white);text-align:center;cursor:pointer}
.fin-new:hover{opacity:.88}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:var(--white);font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:10px 20px;border-radius:var(--R);opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{font-family:var(--fm);font-size:10px;letter-spacing:.06em;color:var(--text3);padding:10px 0}
.loader{display:flex;gap:5px;padding:14px 0}
.ldot{width:4px;height:4px;background:var(--text3);animation:lb .8s infinite}
.ldot:nth-child(2){animation-delay:.13s}.ldot:nth-child(3){animation-delay:.26s}
@keyframes lb{0%,100%{opacity:.2;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="app" id="app"></div>
<script>
const SCOPES='https://www.googleapis.com/auth/calendar.events';
const CAL='https://www.googleapis.com/calendar/v3';

// Area config — color used for bar, button border/arrow
const A=[
  {id:'a1',n:'CREAM&CREAM',s:'C&C', col:'#E8490A'},
  {id:'a2',n:'ANOMALY',    s:'AN',  col:'#111110'},
  {id:'a3',n:'Personal',   s:'PERS',col:'#6B6965'},
  {id:'a4',n:'Proyectos',  s:'PROY',col:'#A8A5A0'},
];
const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DAYSU=['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
const ST=[
  {t:'Pendientes',  s:'¿Qué quedó sin resolver la semana pasada?'},
  {t:'Compromisos', s:'Tus eventos de Google Calendar esta semana'},
  {t:'Prioridades', s:'Lo que tiene que pasar sí o sí'},
  {t:'Plan semanal',s:'Asigná tareas a días concretos'},
];

let G={
  clientId:localStorage.getItem('s_cid')||'',
  token:(()=>{const t=localStorage.getItem('s_tok'),ts=parseInt(localStorage.getItem('s_ts')||'0');return t&&(Date.now()-ts<50*60*1000)?t:null;})(),
  userInfo:null,tokenClient:null,loaded:false,loading:false,
};
let S={
  step:0,finished:false,
  tasks:[
    {id:1,txt:'Revisar costeo temporada',a:'a1',st:'p'},
    {id:2,txt:'Responder a Diego – reunión',a:'a2',st:'p'},
    {id:3,txt:'Turno médico',a:'a3',st:'p'},
    {id:4,txt:'Avanzar packaging nuevo',a:'a4',st:'p'},
    {id:5,txt:'Control stock insumos',a:'a1',st:'p'},
  ],
  events:[],
  prio:{a1:'',a2:'',a3:'',a4:''},
  plan:{Dom:[],Lun:[],Mar:[],Mié:[],Jue:[],Vie:[],Sáb:[]},
  sel:'Lun',
};

/* Helpers */
function wb(){const now=new Date(),d=now.getDay(),mon=new Date(now);mon.setDate(now.getDate()-(d===0?6:d-1));mon.setHours(0,0,0,0);const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);return{mon,sun};}
function wr(){const{mon,sun}=wb();const f=d=>d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'});return`${f(mon)} — ${f(sun)}.${mon.getFullYear()}`;}
function dfl(s){if(!s)return'?';return DAYS[new Date(s+'T12:00:00').getDay()];}
function ar(id){return A.find(x=>x.id===id)||A[0];}
function toast(m,ms=2400){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms);}

// Arrow SVG — same in move buttons and nav circle
function arrowSVG(color,size=16){
  return `<svg width="${size}" height="${size}" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M3 8H13" stroke="${color}" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M9 4L13 8L9 12" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

/* Google Auth */
function initAuth(){
  if(!G.clientId||!window.google)return;
  G.tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:G.clientId,scope:SCOPES,
    callback:async r=>{
      if(r.error){toast('error al conectar');return;}
      G.token=r.access_token;
      localStorage.setItem('s_tok',r.access_token);
      localStorage.setItem('s_ts',Date.now().toString());
      await fetchUser();fetchEvents();
    }
  });
}
function reqAuth(){if(G.tokenClient)G.tokenClient.requestAccessToken({prompt:''});}
async function fetchUser(){
  if(!G.token)return;
  try{const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:`Bearer ${G.token}`}});G.userInfo=await r.json();render();}catch(e){}
}
async function fetchEvents(){
  if(!G.token)return;
  G.loading=true;render();
  const{mon,sun}=wb();
  const p=new URLSearchParams({timeMin:mon.toISOString(),timeMax:sun.toISOString(),singleEvents:true,orderBy:'startTime',maxResults:50});
  try{
    const r=await fetch(`${CAL}/calendars/primary/events?${p}`,{headers:{Authorization:`Bearer ${G.token}`}});
    const d=await r.json();
    const evs=(d.items||[]).map(e=>({id:'gc_'+e.id,gcalId:e.id,tit:e.summary||'(sin título)',day:dfl(e.start?.date||e.start?.dateTime?.slice(0,10)),time:e.start?.dateTime?new Date(e.start.dateTime).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}):'',tp:'e',fromGcal:true}));
    S.events=[...S.events.filter(e=>!e.fromGcal),...evs];
    G.loaded=true;G.loading=false;toast(`${evs.length} eventos importados`);render();
  }catch(e){G.loading=false;toast('error al leer calendar');render();}
}
async function createCalEv(title,day,time,tp){
  if(!G.token)return null;
  const{mon}=wb();const di=DAYS.indexOf(day);const diff=di===0?6:di-1;
  const date=new Date(mon);date.setDate(mon.getDate()+diff);const ds=date.toISOString().slice(0,10);
  let body={summary:title};
  if(tp==='e'&&time){const[h,m]=(time||'09:00').split(':').map(Number);const st=new Date(date);st.setHours(h||9,m||0,0,0);const en=new Date(st);en.setHours(st.getHours()+1);body.start={dateTime:st.toISOString(),timeZone:'America/Argentina/Buenos_Aires'};body.end={dateTime:en.toISOString(),timeZone:'America/Argentina/Buenos_Aires'};}
  else{body.start={date:ds};body.end={date:ds};}
  try{const r=await fetch(`${CAL}/calendars/primary/events`,{method:'POST',headers:{Authorization:`Bearer ${G.token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});const ev=await r.json();toast('guardado en calendar');return ev.id;}
  catch(e){toast('no se pudo guardar');return null;}
}
async function deleteCalEv(gcalId){
  if(!G.token||!gcalId)return;
  try{await fetch(`${CAL}/calendars/primary/events/${gcalId}`,{method:'DELETE',headers:{Authorization:`Bearer ${G.token}`}});toast('eliminado de calendar');}catch(e){}
}

/* Render */
function render(){
  const el=document.getElementById('app');
  if(!G.clientId||!G.token){el.innerHTML=authHTML();return;}
  if(S.finished){el.innerHTML=finishHTML();return;}
  el.innerHTML=`
    <div class="hdr">
      <div class="hdr-top">
        <span class="hdr-date">${wr()}</span>
        <div class="hdr-right">
          ${G.userInfo?`<div class="user-chip" onclick="signOut()">
            ${G.userInfo.picture?`<img class="user-av" src="${G.userInfo.picture}" alt="">`:`<div class="user-av"></div>`}
            <span class="user-nm">${(G.userInfo.given_name||'yo').toUpperCase()}</span>
          </div>`:''}
          <div class="hchip">
            <div class="hchip-dot" style="background:${G.loading?'#F2A42A':G.loaded?'var(--acc)':'var(--text3)'}"></div>
            <span class="hchip-lbl">${G.loading?'SYNC':G.loaded?'CAL':'—'}</span>
          </div>
        </div>
      </div>
      <div class="hdr-kicker">Ritual semanal — ${new Date().getFullYear()}</div>
      <div class="hdr-title">Revisión<br>semanal<span>.</span></div>
      <div class="area-tabs">
        ${A.map(a=>`<div class="atab ${S.step===0&&S.tasks.some(t=>t.a===a.id&&t.st==='p')?'on':''}">${a.s}</div>`).join('')}
      </div>
    </div>
    <div class="steps">
      ${ST.map((s,i)=>`
        <div class="sn ${i===S.step?'on':''} ${i<S.step?'done':''}" onclick="if(${i}<=${S.step})gs(${i})">
          <div class="sn-bar"></div>
          <div class="sn-num">${i<S.step?'✓':'0'+(i+1)}</div>
          <div class="sn-lbl">${s.t}</div>
        </div>`).join('')}
    </div>
    <div class="body">
      <div class="step-num">PASO 0${S.step+1} / 04</div>
      <div class="step-head-row">
        <div><div class="step-t">${ST[S.step].t}</div></div>
        ${S.step===1?`<button class="sync-btn" onclick="fetchEvents()">${G.loading?'…':'↻ SYNC'}</button>`:''}
      </div>
      <div class="step-s">${ST[S.step].s}</div>
      ${[step0,step1,step2,step3][S.step]()}
    </div>
    <div class="nav">
      <div class="nav-track" id="navTrack">
        <span class="nav-hint-l" id="hintL" style="opacity:${S.step===0?.12:1}">${S.step===0?'INICIO':'← ATRÁS'}</span>
        <span class="nav-step" id="navStep">${S.step+1} / 4</span>
        <span class="nav-hint-r" id="hintR" style="opacity:${S.step===3?.12:1}">${S.step===3?'CERRAR':'SIGUIENTE →'}</span>
        <div class="nav-circle" id="navCircle">
          ${arrowSVG('white',18)}
        </div>
      </div>
    </div>`;
  requestAnimationFrame(initSwipe);
}

function taskCard(t){
  const a=ar(t.a);
  const done=t.st==='d';
  const moved=t.st==='m';
  return`<div class="tcard ${done?'done':''}">
    <div class="tc-bar" style="background:${a.col}"></div>
    <div class="chk-wrap" onclick="toggleT(${t.id})">
      <div class="chk-c" style="${done?`background:${a.col};border:none`:``}">
        ${done?`<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
      </div>
    </div>
    <span class="ttxt ${done?'x':''}">${t.txt}</span>
    <span class="ttag" style="padding-right:${!done&&!moved?'6px':'10px'}">${a.s}</span>
    ${!done&&!moved?`
      <button class="tmv" style="border-color:${a.col}" onclick="moveT(${t.id})">
        ${arrowSVG(a.col,14)}
      </button>`:''}
    ${moved?`<span class="moved-lbl">MOV.</span>`:''}
    ${done?`<div style="width:47px;flex-shrink:0"></div>`:''}
  </div>`;
}

/* Swipe nav */
function initSwipe(){
  const circle=document.getElementById('navCircle');
  const track=document.getElementById('navTrack');
  if(!circle||!track)return;
  const R=27;
  const trackW=track.offsetWidth;
  const circD=R*2;
  const mid=(trackW-circD)/2;
  const maxX=trackW-circD-2;
  const threshold=trackW*0.30;
  let dragging=false,startX=0;
  const hL=document.getElementById('hintL');
  const hR=document.getElementById('hintR');
  const ns=document.getElementById('navStep');
  const svg=circle.querySelector('svg');
  circle.style.left=mid+'px';

  function setPos(x,anim){
    x=Math.max(2,Math.min(maxX,x));
    circle.style.transition=anim?'left .38s cubic-bezier(.34,1.56,.64,1)':'none';
    circle.style.left=x+'px';
    const prog=(x-mid)/(maxX-mid);
    if(svg) svg.style.transform=prog<-0.1?'rotate(180deg)':'rotate(0deg)';
    const fadeL=x<mid?Math.max(0,1-(mid-x)/mid*2):(S.step===0?.12:1);
    const fadeR=x>mid?Math.max(0,1-(x-mid)/(maxX-mid)*2):(S.step===3?.12:1);
    if(hL)hL.style.opacity=fadeL;
    if(hR)hR.style.opacity=fadeR;
    if(ns)ns.style.opacity=Math.max(0,1-Math.abs(x-mid)/mid*1.5);
  }
  function onStart(cx){dragging=true;startX=cx-parseFloat(circle.style.left||mid);circle.style.transition='none';}
  function onMove(cx){if(!dragging)return;setPos(cx-startX,false);}
  function onEnd(){
    if(!dragging)return;dragging=false;
    const x=parseFloat(circle.style.left);
    if(x>mid+threshold){if(S.step<3)next();else if(S.step===3)fin();else setPos(mid,true);return;}
    if(x<mid-threshold){if(S.step>0)prev();else setPos(mid,true);return;}
    setPos(mid,true);
  }
  circle.addEventListener('touchstart',e=>{onStart(e.touches[0].clientX);e.preventDefault();},{passive:false});
  window.addEventListener('touchmove',e=>{if(dragging){onMove(e.touches[0].clientX);e.preventDefault();}},{passive:false});
  window.addEventListener('touchend',onEnd);
  circle.addEventListener('mousedown',e=>onStart(e.clientX));
  window.addEventListener('mousemove',e=>{if(dragging)onMove(e.clientX);});
  window.addEventListener('mouseup',onEnd);
}

function gs(i){S.step=i;render();}
function next(){if(S.step<3){S.step++;render();}}
function prev(){if(S.step>0){S.step--;render();}}
function selDay(d){S.sel=d;render();}
function toggleT(id){const t=S.tasks.find(x=>x.id===id);if(t){t.st=t.st==='d'?'p':'d';render();}}
function moveT(id){const t=S.tasks.find(x=>x.id===id);if(t){t.st='m';render();}}
function addT(){const v=document.getElementById('nt')?.value?.trim(),a=document.getElementById('na')?.value;if(!v)return;S.tasks.push({id:Date.now(),txt:v,a,st:'p'});render();}
async function delEv(id,gcalId){S.events=S.events.filter(e=>e.id!==id);if(gcalId&&G.token&&G.token!=='skip')await deleteCalEv(gcalId);render();}
async function addEv(){
  const t=document.getElementById('et')?.value?.trim(),d=document.getElementById('ed')?.value,ti=document.getElementById('eti')?.value?.trim(),tp=document.getElementById('etp')?.value;
  if(!t)return;
  let gcalId=null;if(G.token&&G.token!=='skip')gcalId=await createCalEv(t,d,ti,tp);
  S.events.push({id:'m'+Date.now(),gcalId,tit:t,day:d,time:ti,tp,fromGcal:false});render();
}
function delPlan(day,i){S.plan[day].splice(i,1);render();}
async function addPlan(){
  const t=document.getElementById('pt')?.value?.trim(),a=document.getElementById('pa')?.value,tp=document.getElementById('ptp')?.value,time=document.getElementById('ptime')?.value?.trim();
  if(!t)return;
  let gcalId=null;if(G.token&&G.token!=='skip')gcalId=await createCalEv(t,S.sel,time,tp);
  if(!S.plan[S.sel])S.plan[S.sel]=[];
  S.plan[S.sel].push({txt:t,a,id:Date.now(),gcalId});render();
}
async function assignMoved(id){
  const t=S.tasks.find(x=>x.id===id);if(!t)return;
  let gcalId=null;if(G.token&&G.token!=='skip')gcalId=await createCalEv(t.txt,S.sel,'','t');
  if(!S.plan[S.sel])S.plan[S.sel]=[];
  S.plan[S.sel].push({txt:t.txt,a:t.a,id:Date.now(),gcalId});t.st='planned';render();
}
function fin(){S.finished=true;render();}
function resetApp(){
  S.step=0;S.finished=false;S.prio={a1:'',a2:'',a3:'',a4:''};
  S.plan={Dom:[],Lun:[],Mar:[],Mié:[],Jue:[],Vie:[],Sáb:[]};
  S.tasks.forEach(t=>{if(t.st!=='d')t.st='p';});
  render();if(G.token&&G.token!=='skip')fetchEvents();
}
function saveCid(){const v=document.getElementById('cid')?.value?.trim();if(!v){toast('pegá tu client id');return;}G.clientId=v;localStorage.setItem('s_cid',v);render();setTimeout(()=>initAuth(),600);}
function resetCid(){G.clientId='';G.token=null;G.userInfo=null;localStorage.removeItem('s_cid');localStorage.removeItem('s_tok');localStorage.removeItem('s_ts');render();}
function skipAuth(){G.token='skip';render();}
function signOut(){if(confirm('¿Desconectar Google?')){G.token=null;G.userInfo=null;G.loaded=false;localStorage.removeItem('s_tok');localStorage.removeItem('s_ts');S.events=S.events.filter(e=>!e.fromGcal);render();}}

render();
window.addEventListener('load',()=>setTimeout(()=>{
  if(G.clientId&&window.google)initAuth();
  if(G.token&&G.token!=='skip'){fetchUser();fetchEvents();}
},800));
</script>
